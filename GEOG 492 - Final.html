<!DOCTYPE html>
<html>

  <head>
  <meta charset='utf-8' />
  <title>Haley's Post Grad Road Trip</title>
  <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ranchers&display=swap" rel="stylesheet">
   
    <script src="routes.js"></script>
    <style>
        body { margin:0; padding:0; }
        
        #map { position:absolute; top:0; bottom:0; width:100%; }
        
        .popupImage { width:100%; }
         
        .mapboxgl-popup-tip { display: none; }
        
/*Side bar where I can explain each stop*/
        #sidebar {
            position: absolute;
            top: 80px;
            right: 50px;
            width: 500px;
            background: rgb(255, 217, 0);
            border-radius: 8px;
            padding: 15px;
            z-index: 999;
            font-family: "Ranchers", cursive;
            font-weight: 200px;
            display: none; /* makes it hidden until trip starts */
        }
        #sidebar h2 { margin: 0 0 8px; }
        #sidebar img { width: 100%; border-radius: 4px; }
        #sidebar p { font-size: 2.0em; margin: 8px 0 0; }
        #sidebar .source { font-size: 0.6em; opacity: 0.6; margin-top: 4px; }
            
/*next location button displayed as a big arrow*/
        .fly {
            position: absolute;
            top: 20px;
            left: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 200px;
            height: 200px;
            padding: 0;
            border-radius: 50%;
            font-size: 4em;
            text-align: center;
            font-weight: bold;
            color: black;
            background: rgb(255, 217, 0);
            border: 2px solid #000;
            box-shadow: 0 0 8px rgba(0,0,0,0.25);
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            z-index: 5001;
        }
/*makes the next button change when hovered */
        .fly:hover {
            transform: scale(1.1);
            background: rgb(255, 235, 100);
            box-shadow: 0 0 12px rgba(0,0,0,0.35);
        }

/*BUTTONS*/
        button {
            font-family: "Ranchers", cursive;
            font-weight: 400;
            font-style: normal;
        }

        .mapboxgl-popup {
            min-width: 325px;
            font-family: "Ranchers", cursive;
            font-weight: 200;
            font-style: normal;
        } 

/*Title screen*/
        #banner { 
            position: absolute;
            inset: 0; /* full viewport overlay */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 6000;
            font-family: "Ranchers", cursive;
            background: rgba(0,0,0,0.5);
            text-align: center;
            padding: 20px;
        }
        .banner-card {
            background-color: rgb(255, 217, 0);
            padding: 30px 36px;
            border-radius: 12px;
            border: 4px solid #000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            max-width: 800px;
            width: 90%;
        }
        .start-button {
            margin-top: 18px;
            padding: 12px 20px;
            font-size: 1.1em;
            border-radius: 8px;
            border: 2px solid #000;
            background: #1f7a1f;
            color: #fff;
            cursor: pointer;
        }
        #banner h1 {
            font-size: 1.2em;
            margin: 4px 0;
        }
        #banner h2 {
            font-size: 0.9em;
            margin: 4px 0;
        }
/*End screen*/
        #endPopup {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            z-index: 6000;
        }

        .endPopupBox {
            padding: 30px 40px;
            background: rgb(255, 217, 0);
            border: 4px solid #000;
            border-radius: 16px;
            font-family: "Ranchers", cursive;
            font-size: 3em;
            color: black;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
      
    </style>
  </head>
  <body> 
    <div id='map'></div>
    <div id='banner'>
        <div class="banner-card"> 
            <div style="font-size:1.4em;">GEOG 492 Final Project</div>
            <h1>EPIC&nbsp;&nbsp;&nbsp;END&nbsp;&nbsp;&nbsp;OF&nbsp;&nbsp;&nbsp;YEAR&nbsp;&nbsp;&nbsp;ROAD&nbsp;&nbsp;&nbsp;TRIP</h1>
            <h2>By: Haley Alferez</h2>
            <button id="startBtn" class="start-button">Start the Trip</button>
        </div>
    </div>
    <button class='fly' id='nextBtn'>➙</button>

    <div id="endPopup">
        <div class="endPopupBox">Back home ready to start the next adventure!</div>
    </div>

    <div id="sidebar">
        <h2 id="stop-name"></h2>
        <img id="stop-image" class="popupImage" />
        <p id="stop-description"></p>
        <p id="stop-source" class="source"></p>
    </div>

    <script>
//access token
        mapboxgl.accessToken = 'pk.eyJ1IjoiaGFsZmVyZXoiLCJhIjoiY21uaTFxOWJ3MDhjdjJxcHV0enlydnp6cSJ9.CoskwjDtnAWrKo5riK_sTg';
// initalize the map
        var map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/halferez/cmpq06fjj002x01ss6e28181p',
            center: [-123.08968, 44.05212],
            zoom: 11
        });
//plus minus zoom controls
        map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'bottom-left');
//red route line        
        map.on('style.load', () => {
            map.addSource('trace', {
                type: 'geojson',
                data: {
                    type: 'Feature',
                    geometry: {
                        type: 'LineString',
                        coordinates: targetRoute  
                    }
                }
            });
            map.addLayer({
                type: 'line',
                source: 'trace',
                id: 'line',
                paint: {
                    'line-color': 'red',
                    'line-width': 4
                },
                layout: {
                    'line-cap': 'round',
                    'line-join': 'round'
                }
            });

        });
//defines the stops, thier location, and what the sidebar should be populated with
        const stops = [
            {
                name: 'Eugene',
                center: [-123.08968, 44.05212],
                zoom: 11,
                image: 'images/eugene.jpg',
                description: 'Starting the trip in Eugene! We have 14 days to go to Glacier, Yellowstone, and the Bonneville Salt Flats. Thats over 2295 miles!',
                source: 'Trusted Steed'
            },
            {
                name: 'Glacier',
                center: [-113.8000, 48.7550],
                zoom: 10,
                image: 'https://upload.wikimedia.org/wikipedia/commons/5/51/Mountain_Goat_at_Hidden_Lake.jpg',
                description: '3 days later — made it to Glacier! Time to hike and explore.',
                source: 'By Robert M. Russell - Own work, CC BY-SA 4.0'
            },
            {
                name: 'Yellowstone',
                center: [-110.5885, 44.4280],
                zoom: 10,
                image: 'https://jacksonhole-traveler-production.s3.amazonaws.com/wp-content/uploads/2014/11/yellowstone-national-park-5BNS1455.jpg',
                description: 'After 4 days in Glacier national park we make our way to Yellowstone! We will spend another 3 days here.',
                source: 'Jackson Hole Traveler'
            },
            {
                name: 'Bonneville Salt Flats',
                center: [-113.8933, 40.7799],
                zoom: 11,
                image: 'https://ctfassets.ksldigital.com/0wjmk6wgfops/17oZGsiEevOkg7tpUeaFG0/67bf9df09bff4cbb4136881fa771b789/AdobeStockSaltFlats.jpeg?w=1920&h=501&fit=fill&f=center&q=70',
                description: 'After Yellowstone we head to The Bonneville Salt Flats. This will not take up much time and we may check out Salt Lake City while we are in the area.',
                source: 'Adobe Stock'
            },
            {
                name: 'Lake Abert',
                center: [-120.2300, 42.6500],
                zoom: 11,
                image: 'https://www.oregonlive.com/resizer/v2/http%3A%2F%2Fmedia.oregonlive.com%2Fenvironment_impact%2Fphoto%2Flake-abert-june-2014-b4fb5dc2ef6f09d4.jpeg?auth=c1ec62ad31f5aaf00fbe2e2675bbda8993386597027b4038a19799cc619311a6&width=1280&smart=true&quality=90',
                description: 'Lake Abert — this is a stop on the long drive home. It should be a good stop for bird watching!',
                source: 'Oregon Live'
            }
        ];

        let currentStop = 0;
        let tripStarted = false;
//show the current stop and update the sidebar as well as the map location
        function showStop(index, fly = true) {
            const stop = stops[index];

            if (fly) map.flyTo({ center: stop.center, zoom: stop.zoom, duration: 5000 });

            setTimeout(() => {
                document.getElementById('stop-name').textContent = stop.name;
                document.getElementById('stop-image').src = stop.image;
                document.getElementById('stop-description').textContent = stop.description;
                document.getElementById('stop-source').textContent = stop.source || '';
            }, fly ? 5200 : 0);

            const btn = document.getElementById('nextBtn');
            btn.title = index >= stops.length - 1 ? 'Back to Start' : 'Next Location';
        }
// Show the end popup when the trip is complete aka after all the stops have been clicked thorugh
        function showEndPopup() {
            const popup = document.getElementById('endPopup');
            popup.style.display = 'flex';
            popup.onclick = () => { popup.style.display = 'none'; };
            setTimeout(() => {
                popup.style.display = 'none';
            }, 10000);
        }
// hides the end popup after a set time or if the user clicks away
        function hideEndPopup() {
            document.getElementById('endPopup').style.display = 'none';
        }
// fits the map to the bounds of all the stops
        function fitToStops() {
            try {
                const coords = stops.map(s => s.center);
                if (coords.length) {
                    const bounds = coords.reduce((b, c) => b.extend(c), new mapboxgl.LngLatBounds(coords[0], coords[0]));
                    map.fitBounds(bounds, { padding: 60 });
                }
            } catch (e) {
                console.warn('Could not fit to stops:', e);
            }
        }
// Initialize the map when it loads
        map.on('load', () => {fitToStops(); });
//defines the next button that moves to the next stop
        document.getElementById('nextBtn').addEventListener('click', () => {
            document.getElementById('banner').style.display = 'none';
            const prev = currentStop;
            currentStop = (currentStop + 1) % stops.length;
            const wrapped = tripStarted && prev === stops.length - 1 && currentStop === 0;
            showStop(currentStop);
            if (wrapped) showEndPopup(); else hideEndPopup();
        });

// Start trip button function to hide title card, show sidebar, and fly to Eugene (stop 0)
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('banner').style.display = 'none';
            document.getElementById('sidebar').style.display = 'block';
            tripStarted = true;
            currentStop = 0;
            showStop(0, true);
        });
    </script>
  </body>
</html>
